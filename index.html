<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A beautiful, minimal glassmorphic calculator with soft gradients and responsive grid layout. Built with HTML, CSS, and JavaScript.">
    <title>Minimal Glassmorphic Calculator</title>
    <!-- Google Fonts: Poppins (UI) & Orbitron (Digital Display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utils.css">
</head>
<body>
    <!-- Background dynamic gradient blobs to emphasize the glassmorphism -->
    <div class="blob-container">
        <div class="blob blob-1" id="blob-1"></div>
        <div class="blob blob-2" id="blob-2"></div>
    </div>

    <main class="wrapper flex flex-col items-center">
        <h1 class="calculator-title text-center">Interactive Calculator</h1>
        
        <div class="calculator-card flex flex-col" id="calculator">
            <!-- Screen Display Area -->
            <div class="display-container">
                <input class="input" type="text" placeholder="0" readonly id="calc-display"/>
            </div>
            
            <!-- Button Grid Area -->
            <div class="grid-container">
                <!-- Row 1 -->
                <button class="button btn-back" id="btn-back">←</button>
                <button class="button btn-clear" id="btn-clear">C</button>
                <button class="button btn-operator" id="btn-mod">%</button>
                <button class="button btn-operator" id="btn-div">÷</button>

                <!-- Row 2 -->
                <button class="button" id="btn-7">7</button>
                <button class="button" id="btn-8">8</button>
                <button class="button" id="btn-9">9</button>
                <button class="button btn-operator" id="btn-mul">x</button>

                <!-- Row 3 -->
                <button class="button" id="btn-4">4</button>
                <button class="button" id="btn-5">5</button>
                <button class="button" id="btn-6">6</button>
                <button class="button btn-operator" id="btn-sub">-</button>

                <!-- Row 4 -->
                <button class="button" id="btn-1">1</button>
                <button class="button" id="btn-2">2</button>
                <button class="button" id="btn-3">3</button>
                <button class="button btn-operator" id="btn-add">+</button>

                <!-- Row 5 -->
                <button class="button zero" id="btn-0">0</button>
                <button class="button btn-operator" id="btn-eq">=</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
